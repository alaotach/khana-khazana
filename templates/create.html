<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), url("{{ url_for('static', filename='assets/bg.png') }}");
            background-size: cover;
            background-repeat: repeat;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 80%;
            max-width: 600px;
            text-align: left;
        }
        h1 {
            color: #ff6347;
            text-align: center;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #ff6347;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e5533d;
        }
        .ck-editor__editable_inline {
            height: 200px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create a New Recipe</h1>
        <form action="{{ url_for('create_recipe') }}" method="post">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="ing">Ingredients:</label>
                <textarea id="ing" name="ing" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label for="ins">Instructions:</label>
                <textarea id="ins" name="ins" rows="5"></textarea>
            </div>
            <button id="btn" type="submit">Create Recipe</button>
        </form>
    </div>
    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <script>
        const editorConfig = {
            ckfinder: {
                uploadUrl: '/upload'
            },
            removePlugins: ['MediaEmbed']
        };
        ClassicEditor.create(document.querySelector("#ing"), editorConfig).catch(err => console.error(err));
        ClassicEditor.create(document.querySelector("#ins"), editorConfig).catch(err => console.error(err));
        document.getElementById('btn').addEventListener('click', function() {
            alert('Recipe created successfully!');
        });
    </script>
</body>

</html>
