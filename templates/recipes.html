<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khana Khazana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), url("{{ url_for('static', filename='assets/bg.png') }}");
            background-size: cover;
            background-repeat: repeat;
        }
        h1 {
            color: #ff6347;
            position: absolute;
            top: 40px;
            text-align: center;
            width: 100%;
            margin: 0;
        }
        .recipes-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
        .recipe-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
        }
        .recipe-card h2 {
            margin-top: 0;
        }
    </style>

</head>
<body>
    <h1>Recipes</h1>
    <div class="recipes-container">
        {% for recipe in recipes %}
            <div class="recipe-card">
                <h2>{{ recipe.name }}</h2>
                <a href="{{ url_for('recipe', id=recipe.id) }}">View Full Recipe</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
