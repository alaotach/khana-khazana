<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ recipe.name }} - Khana Khazana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: linear-gradient(rgba(10, 10, 10, 0.7), rgba(10, 10, 10, 0.7)), url("{{ url_for('static', filename='assets/bg.png') }}");
            background-size: cover;
            background-repeat: repeat;
        }
        .recipe-details {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 80%;
            max-width: 600px;
            text-align: left;
            margin-top: 50px;
        }
        h1 {
            color: #ff6347;
            text-align: center;
            margin-top: 0;
        }
        p {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }
        .recipe-details img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    {% include "nav.html" %}
    <div class="recipe-details" style="margin-top: 80px;">
        <h1>{{ recipe.name }}</h1>
        <p><strong>Ingredients:</strong></p>
        <div>{{ recipe.ing|safe }}</div>
        <p><strong>Instructions:</strong></p>
        <div>{{ recipe.ins|safe }}</div>
        <p style="text-align:center;"><a href="{{ url_for('recipes') }}" style="color:#ff6347; font-weight:bold; text-decoration:none;">Back to Recipes</a></p>
    </div>
</body>
</html>
